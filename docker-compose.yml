services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-3600}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      # Points the Streamlit app at the API service inside the Docker network.
      - API_URL=http://api:8000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-agent-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}"
      - "--web.enable-lifecycle"
    volumes:
      - ${PROMETHEUS_CONFIG_FILE:-./monitoring/prometheus/prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      # Keep Prometheus available only from the EC2 host. Use SSH tunnelling if needed.
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:latest
    container_name: ai-agent-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-this-password}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

  # Linux host metrics exporter. Disabled by default because Docker Desktop on
  # Windows/WSL2 does not support the Linux bind mount propagation used below.
  # Enable on EC2/Linux with: docker compose --profile linux-host-monitoring up -d
  node-exporter:
    profiles: ["linux-host-monitoring"]
    image: prom/node-exporter:latest
    container_name: ai-agent-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  # Docker container metrics exporter. Disabled by default for local Windows
  # runs because it requires Linux host filesystem mounts and can produce very
  # noisy WSL2 mount logs. Enable on EC2/Linux with the linux-host-monitoring profile.
  cadvisor:
    profiles: ["linux-host-monitoring"]
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ai-agent-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
